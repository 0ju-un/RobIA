[network]
model = robia
checkpoint = weights/robia_attex_moe.ckpt
teacher_checkpoint = weights/coex.ckpt

[environment]
dataset = drivingstereo
datapath = /path/to/data

[adaptation]
optimizer = Adam
lr = 5e-6
lr_teacher = 5e-6
adapt_mode = full++
use_sgm_aug = True
proxy_aug_weight = 0.1
sample_mode = prob
gpu = 0

[freeze]
freeze = True
keys = 
	gate
    emb
	spx

[coex]
yaml_path = cfgs/coex.yaml
backbone = mobilenetv2_100_attex_moe

